<h2>Add Contact</h2>

<input type="number" [(ngModel)]="contact.id" placeholder="Id">
<br><br>

<input type="text" [(ngModel)]="contact.name" placeholder="Name">
<br><br>

<input type="email" [(ngModel)]="contact.email" placeholder="Email">
<br><br>

<input type="text" [(ngModel)]="contact.phone" placeholder="Phone">
<br><br>

<button (click)="addContact()">Add Contact</button>
