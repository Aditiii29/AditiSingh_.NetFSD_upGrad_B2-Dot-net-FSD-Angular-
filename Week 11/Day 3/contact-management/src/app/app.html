<div style="font-family: Arial, sans-serif;">
  <nav style="background-color:#3f51b5; padding:12px 20px; display:flex; justify-content:space-between; align-items:center;">
    <div>
      <a routerLink="/contacts" style="color:white; margin-right:20px; text-decoration:none; font-weight:bold;">
        📋 Contact List
      </a>
      <a routerLink="/add-contact" style="color:white; text-decoration:none; font-weight:bold;">
        ➕ Add Contact
      </a>
    </div>
    <div>
      <span style="color:white; margin-right:15px;">
        Status: <strong>{{ authService.isLoggedIn ? '🟢 Logged In' : '🔴 Logged Out' }}</strong>
      </span>
      <button *ngIf="!authService.isLoggedIn" (click)="login()"
        style="background:#4caf50; color:white; border:none; padding:8px 16px; cursor:pointer; border-radius:4px;">
        🔓 Login
      </button>
      <button *ngIf="authService.isLoggedIn" (click)="logout()"
        style="background:#f44336; color:white; border:none; padding:8px 16px; cursor:pointer; border-radius:4px;">
        🔒 Logout
      </button>
    </div>
  </nav>
  <div style="padding: 20px;">
    <router-outlet></router-outlet>
  </div>
</div>
