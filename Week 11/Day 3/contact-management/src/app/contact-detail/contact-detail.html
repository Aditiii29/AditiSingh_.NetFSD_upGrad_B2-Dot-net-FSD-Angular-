<h2>👤 Contact Details <span style="font-size:14px; color:red;">(Protected)</span></h2>

<div *ngIf="contact; else notFound"
  style="background:#f5f5f5; padding:20px; border-radius:8px; max-width:400px;">
  <p><strong>ID:</strong> {{ contact.id }}</p>
  <p><strong>Name:</strong> {{ contact.name }}</p>
  <p><strong>Phone:</strong> {{ contact.phone }}</p>
  <p><strong>Email:</strong> {{ contact.email }}</p>
  <p><strong>City:</strong> {{ contact.city }}</p>
  <a routerLink="/contacts" style="color:#3f51b5;">← Back to List</a>
</div>

<ng-template #notFound>
  <p style="color:red;">Contact not found!</p>
  <a routerLink="/contacts" style="color:#3f51b5;">← Back</a>
</ng-template>
