<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>upGrad EMS | Contact Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
    <div class="container-xl">
      <a class="navbar-brand brand-mark" href="index.html">upGrad EMS</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container-xl py-5 page-min-height">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card border-0 shadow-soft">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-3">Contact Us</h1>
            <p class="text-muted mb-4">Reach out for support, partnership, or event-related queries.</p>

            <form id="contactForm" novalidate>
              <div class="mb-3">
                <label for="contactName" class="form-label">Name</label>
                <input type="text" id="contactName" class="form-control" pattern="^[A-Za-z ]{2,50}$" required />
                <div class="invalid-feedback">Enter a valid name.</div>
              </div>
              <div class="mb-3">
                <label for="contactEmail" class="form-label">Email</label>
                <input type="email" id="contactEmail" class="form-control" required />
                <div class="invalid-feedback">Enter a valid email address.</div>
              </div>
              <div class="mb-4">
                <label for="contactDescription" class="form-label">Description</label>
                <textarea id="contactDescription" class="form-control" rows="4" minlength="10" required></textarea>
                <div class="invalid-feedback">Description must be at least 10 characters.</div>
              </div>
              <button type="submit" class="btn btn-primary">Submit</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/common.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
