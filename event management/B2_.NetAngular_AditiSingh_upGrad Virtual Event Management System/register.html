<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>upGrad EMS | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
    <div class="container-xl">
      <a class="navbar-brand brand-mark" href="index.html">upGrad EMS</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container-xl py-5 page-min-height">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-soft">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-4">Event Registration</h1>

            <form id="registerForm" novalidate>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label for="regEventId" class="form-label">Event ID</label>
                  <input type="text" id="regEventId" class="form-control" readonly />
                </div>
                <div class="col-md-6">
                  <label for="regEventName" class="form-label">Event Name</label>
                  <input type="text" id="regEventName" class="form-control" readonly />
                </div>
                <div class="col-md-4">
                  <label for="regCategory" class="form-label">Category</label>
                  <input type="text" id="regCategory" class="form-control" readonly />
                </div>
                <div class="col-md-4">
                  <label for="regDate" class="form-label">Date</label>
                  <input type="text" id="regDate" class="form-control" readonly />
                </div>
                <div class="col-md-4">
                  <label for="regTime" class="form-label">Time</label>
                  <input type="text" id="regTime" class="form-control" readonly />
                </div>
              </div>

              <hr class="my-4" />

              <div class="row g-3">
                <div class="col-md-6">
                  <label for="firstName" class="form-label">First Name</label>
                  <input type="text" id="firstName" class="form-control" pattern="^[A-Za-z ]{2,30}$" required />
                  <div class="invalid-feedback">Enter valid first name.</div>
                </div>
                <div class="col-md-6">
                  <label for="lastName" class="form-label">Last Name</label>
                  <input type="text" id="lastName" class="form-control" pattern="^[A-Za-z ]{2,30}$" required />
                  <div class="invalid-feedback">Enter valid last name.</div>
                </div>
                <div class="col-12">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" id="email" class="form-control" required />
                  <div class="invalid-feedback">Enter valid email address.</div>
                </div>
              </div>

              <div class="d-flex gap-3 mt-4 flex-wrap">
                <button type="submit" class="btn btn-primary">Register</button>
                <a href="index.html" class="btn btn-outline-secondary">Back to Home</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/common.js"></script>
  <script src="js/db.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
