<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>

    <!-- Bootstrap for styling (optional but clean UI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

<div class="container my-5">
    <div class="card shadow-sm p-4">

        <h3 class="mb-4 text-center">Student Feedback Form</h3>

        <form id="feedbackForm">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" id="name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email">
            </div>

            <div class="mb-3">
                <label class="form-label">Course Rating</label>
                <select class="form-select" id="rating">
                    <option value="">Select Rating</option>
                    <option>Excellent</option>
                    <option>Good</option>
                    <option>Average</option>
                    <option>Poor</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Comments</label>
                <textarea class="form-control" id="comments"></textarea>
            </div>

            <button type="button" class="btn btn-primary w-100" id="submitBtn">
                Submit Feedback
            </button>

        </form>

        <!-- Success / Error message will appear here -->
        <div id="messageBox" class="mt-3"></div>

    </div>
</div>

<script>

$(document).ready(function() {

    $("#submitBtn").click(function() {

        let name = $("#name").val().trim();
        let email = $("#email").val().trim();

        // Clear previous message
        $("#messageBox").html("");

        // Validation
        if (name === "" || email === "") {

            $("#messageBox").html(
                '<div class="alert alert-danger">Please enter Name and Email.</div>'
            );

            return;
        }

        // Success Message
        $("#messageBox").html(
            '<div class="alert alert-success">Thank you, ' + name + '! Your feedback has been submitted successfully.</div>'
        );

        // Clear form fields
        $("#feedbackForm")[0].reset();

    });

});

</script>

</body>
</html>
