<!DOCTYPE html>
<html>
<head>
    <title>Product List with Cart Counter</title>

    <!-- Bootstrap (for clean UI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        .confirmation {
            font-size: 14px;
            color: green;
            margin-left: 10px;
        }
    </style>
</head>

<body class="bg-light">

<div class="container my-5">

    <!-- CART COUNTER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Products</h2>
        <h5>
            🛒 Cart:
            <span id="cartCount" class="badge bg-primary">0</span>
        </h5>
    </div>

    <!-- PRODUCT LIST -->
    <div class="row" id="productList">

        <div class="col-md-3 mb-4">
            <div class="card p-3 text-center">
                <h5>Laptop</h5>
                <button class="btn btn-primary addToCart">Add to Cart</button>
                <span class="confirmation"></span>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card p-3 text-center">
                <h5>Smartphone</h5>
                <button class="btn btn-primary addToCart">Add to Cart</button>
                <span class="confirmation"></span>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card p-3 text-center">
                <h5>Headphones</h5>
                <button class="btn btn-primary addToCart">Add to Cart</button>
                <span class="confirmation"></span>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card p-3 text-center">
                <h5>Smartwatch</h5>
                <button class="btn btn-primary addToCart">Add to Cart</button>
                <span class="confirmation"></span>
            </div>
        </div>

    </div>
</div>

<script>

$(document).ready(function() {

    let cartCounter = 0;

    // EVENT DELEGATION
    $("#productList").on("click", ".addToCart", function() {

        // Increase counter
        cartCounter++;
        $("#cartCount").text(cartCounter);

        // Disable button
        $(this).prop("disabled", true);

        // Change button text using .text()
        $(this).text("Added");

        // Add attribute using .attr()
        $(this).attr("data-added", "true");

        // Show confirmation message
        $(this).siblings(".confirmation")
               .text("✔ Added to cart!");

    });

});

</script>

</body>
</html>
